    type: OpenAPI
  - url: asyncapi/centml-asyncapi.yml
    type: AsyncAPI
  - url: collections/centml.postman_collection.json
    type: Postman
  description: OpenAI-compatible chat completions and text completions across open
    models (Llama, Qwen, DeepSeek, GPT OSS and others) running on CentML-optimized
    serverless GPU endpoints, with streaming, tool use, and structured outputs.

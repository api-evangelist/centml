aid: centml
url: https://raw.githubusercontent.com/api-evangelist/centml/refs/heads/main/apis.yml
name: CentML
kind: company
description: CentML is an AI inference optimization platform that serves popular open
  models through OpenAI-compatible serverless endpoints and lets teams stand up
  dedicated, autoscaling model-serving deployments and compute clusters. The serverless
  inference API runs at https://api.centml.com/openai/v1 with Bearer API keys, while
  a separate platform (control-plane) API manages deployments and clusters.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- LLM
- Inference
- Serverless
- GPU
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
